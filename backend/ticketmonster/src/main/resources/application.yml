spring:
  application:
    name: ticketmonster

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ticketmonster}
    username: ${POSTGRES_USER:ticketmonster}
    password: ${POSTGRES_PASSWORD:ticketmonster}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

  mongodb:
    host: ${MONGO_HOST:localhost}
    port: ${MONGO_PORT:27017}
    database: ${MONGO_DB:ticketmonster_catalog}
    username: ${MONGO_USER:ticketmonster}
    password: ${MONGO_PASSWORD:ticketmonster}
    authentication-database: ${MONGO_AUTH_DB:admin}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ticketmonster
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: es.janrax.ticketmonster.*

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ticket-monster}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/ticket-monster/protocol/openid-connect/certs}

  graphql:
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:true}
    schema:
      locations: classpath:graphql/**/
    path: /graphql

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      catalog:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      reservation:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      payment:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      global:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0
  timelimiter:
    instances:
      default:
        timeout-duration: 5s

ticketmonster:
  reservation:
    ttl-minutes: ${RESERVATION_TTL_MINUTES:10}
    max-tickets-per-customer: ${MAX_TICKETS_PER_CUSTOMER:3}
  queue:
    batch-size: ${QUEUE_BATCH_SIZE:500}
    batch-interval-ms: ${QUEUE_BATCH_INTERVAL_MS:2000}
    token-ttl-minutes: ${QUEUE_TOKEN_TTL_MINUTES:5}

app:
  datasource:
    reservation-schema: ${RESERVATION_SCHEMA:reservation}
    payment-schema: ${PAYMENT_SCHEMA:payment}
