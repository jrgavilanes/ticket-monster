spring:
  application:
    name: api-gateway

  autoconfigure:
    exclude:
      - io.github.resilience4j.springboot3.circuitbreaker.autoconfigure.CircuitBreakerStreamEventsAutoConfiguration

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: catalog-graphql
              uri: ${MONOLITH_URI:http://localhost:8082}
              predicates:
                - Path=/graphql
              filters:
                - name: CircuitBreaker
                  args:
                    name: catalog
                    fallbackUri: forward:/fallback/catalog
            - id: queue-service
              uri: ${MONOLITH_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/queue/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: queue
                    fallbackUri: forward:/fallback/queue
            - id: reservation-service
              uri: ${MONOLITH_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/reservations/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: reservation
                    fallbackUri: forward:/fallback/reservation
            - id: payment-service
              uri: ${MONOLITH_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: payment
                    fallbackUri: forward:/fallback/payment

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@userKeyResolver}"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ticket-monster}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/ticket-monster/protocol/openid-connect/certs}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      catalog:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      queue:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      reservation:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      payment:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      catalog:
        timeout-duration: 3s
      queue:
        timeout-duration: 3s
      reservation:
        timeout-duration: 5s
      payment:
        timeout-duration: 5s

gateway:
  public-routes:
    - /graphql
    - /actuator/**
    - /fallback/**
