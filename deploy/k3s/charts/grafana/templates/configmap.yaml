apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ds
  namespace: {{ .Values.namespace }}
data:
  datasources.yml: |
    {{- .Values.datasources | nindent 6 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: {{ .Values.namespace }}
data:
  provider.yaml: |
    {{- .Files.Get "dashboards/provider.yaml" | nindent 4 }}
