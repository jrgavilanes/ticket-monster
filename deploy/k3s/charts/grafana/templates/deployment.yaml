apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.adminUser }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecretName }}
                  key: {{ .Values.adminPasswordKey }}
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.domain }}{{ .Values.subPath }}"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: {{ .Values.auth.oauthEnabled | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN
              value: {{ .Values.auth.oauthAutoLogin | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: {{ .Values.auth.oauthAllowSignUp | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: Keycloak
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: grafana
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: oauth-client-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: {{ .Values.auth.oauthScopes }}
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "https://{{ .Values.domain }}/auth/realms/{{ .Values.auth.keycloakRealm }}/protocol/openid-connect/auth"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "{{ .Values.auth.keycloakInternalUrl }}/realms/{{ .Values.auth.keycloakRealm }}/protocol/openid-connect/token"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "{{ .Values.auth.keycloakInternalUrl }}/realms/{{ .Values.auth.keycloakRealm }}/protocol/openid-connect/userinfo"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: {{ .Values.auth.oauthRoleAttributePath }}
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
              value: {{ .Values.auth.oauthRoleAttributeStrict | quote }}
          ports:
            - containerPort: {{ .Values.port }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-ds
            items:
              - key: datasources.yml
                path: datasources.yml
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
            items:
              - key: provider.yaml
                path: provider.yaml
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
