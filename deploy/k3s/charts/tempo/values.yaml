namespace: observability

image:
  repository: grafana/tempo
  tag: 2.7.0

storage: 10Gi

httpPort: 3200
otlpGrpcPort: 4317
otlpHttpPort: 4318

config: |
  server:
    http_listen_port: 3200

  distributor:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m

  compactor:
    compaction:
      block_retention: 48h

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
