apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: api-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: MONOLITH_URI
              value: {{ .Values.monolithUri }}
            - name: REDIS_HOST
              value: redis-master.infrastructure.svc.cluster.local
            - name: KEYCLOAK_ISSUER_URI
              value: http://keycloak.infrastructure.svc.cluster.local:8080/realms/ticket-monster
          envFrom:
            - secretRef:
                name: redis-credentials
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
